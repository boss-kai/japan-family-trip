<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>좌표 피커</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:monospace;display:flex;flex-direction:column;align-items:center}
h2{margin:1rem}
#info{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.8);padding:12px;border-radius:8px;z-index:10;font-size:14px;line-height:1.8}
#wrap{position:relative;cursor:crosshair}
canvas{display:block;max-width:100vw}
.dot{position:absolute;width:12px;height:12px;border-radius:50%;background:red;border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;z-index:5}
.dot-label{position:absolute;color:#ff0;font-size:12px;font-weight:bold;transform:translate(10px,-50%);white-space:nowrap;z-index:5}
#log{margin:1rem;padding:1rem;background:#222;border-radius:8px;max-width:900px;width:90%;white-space:pre-wrap;font-size:13px;line-height:1.6}
button{margin:.5rem;padding:8px 16px;font-size:14px;cursor:pointer;border:none;border-radius:6px;background:#FF375F;color:#fff}
button:hover{background:#e0304f}
</style></head>
<body>
<h2>MP4 마지막 프레임 좌표 피커</h2>
<p>영상을 끝까지 재생 후 마지막 프레임이 표시됩니다. 클릭하면 좌표가 기록됩니다.</p>
<div id="info">
  클릭 순서:<br>
  1. 삿포로 (홋카이도)<br>
  2. 도쿄 (혼슈 동해안)<br>
  3. 나라 (칸사이)<br>
  4. 교토 (칸사이)<br>
  5. 후쿠오카 (큐슈)<br>
  <br>현재: <b id="current">삿포로</b><br>
  마우스: <span id="pos">-</span>
</div>
<div id="wrap">
  <canvas id="cv"></canvas>
</div>
<div>
  <button onclick="undoLast()">↩ 되돌리기</button>
  <button onclick="resetAll()">🔄 초기화</button>
  <button onclick="copyResult()">📋 SVG 코드 복사</button>
</div>
<div id="log">좌표를 클릭하면 여기에 표시됩니다...</div>

<script>
const cities = ['삿포로','도쿄','나라','교토','후쿠오카'];
const cityEn = ['Sapporo','Tokyo','Nara','Kyoto','Fukuoka'];
const cityJp = ['札幌','東京','奈良','京都','福岡'];
const cityDays = ['Day 1-3','Day 4-7','Day 8-9','Day 10-12','Day 13-14'];
const points = [];
let idx = 0;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('wrap');
const log = document.getElementById('log');

// Load video, seek to end, capture frame
const vid = document.createElement('video');
vid.src = 'img/0_map/영상_지도_평면화_요청.mp4';
vid.muted = true;
vid.playsInline = true;
vid.preload = 'auto';

vid.addEventListener('loadedmetadata', () => {
  cv.width = vid.videoWidth;
  cv.height = vid.videoHeight;
  // Seek to last frame
  vid.currentTime = vid.duration - 0.05;
});

vid.addEventListener('seeked', () => {
  ctx.drawImage(vid, 0, 0);
  log.textContent = `프레임 캡처 완료: ${vid.videoWidth}x${vid.videoHeight}\n클릭으로 도시 위치를 찍어주세요.\n`;
});

// Mouse position
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  const sx = cv.width / r.width;
  const sy = cv.height / r.height;
  const x = Math.round((e.clientX - r.left) * sx);
  const y = Math.round((e.clientY - r.top) * sy);
  document.getElementById('pos').textContent = `(${x}, ${y})`;
});

// Click to record
cv.addEventListener('click', e => {
  if (idx >= cities.length) return;
  const r = cv.getBoundingClientRect();
  const sx = cv.width / r.width;
  const sy = cv.height / r.height;
  const x = Math.round((e.clientX - r.left) * sx);
  const y = Math.round((e.clientY - r.top) * sy);

  points.push({x, y, name: cities[idx]});

  // Visual dot
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.left = (e.clientX - r.left) + 'px';
  dot.style.top = (e.clientY - r.top) + 'px';
  dot.dataset.idx = idx;
  wrap.appendChild(dot);

  const lbl = document.createElement('div');
  lbl.className = 'dot-label';
  lbl.style.left = (e.clientX - r.left) + 'px';
  lbl.style.top = (e.clientY - r.top) + 'px';
  lbl.textContent = `${cities[idx]} (${x},${y})`;
  lbl.dataset.idx = idx;
  wrap.appendChild(lbl);

  log.textContent += `${cities[idx]}: (${x}, ${y})\n`;
  idx++;

  if (idx < cities.length) {
    document.getElementById('current').textContent = cities[idx];
  } else {
    document.getElementById('current').textContent = '완료!';
    generateSVG();
  }
});

function undoLast() {
  if (idx === 0) return;
  idx--;
  points.pop();
  wrap.querySelectorAll(`[data-idx="${idx}"]`).forEach(el => el.remove());
  document.getElementById('current').textContent = cities[idx];
  log.textContent = `프레임: ${cv.width}x${cv.height}\n`;
  points.forEach(p => log.textContent += `${p.name}: (${p.x}, ${p.y})\n`);
}

function resetAll() {
  idx = 0;
  points.length = 0;
  wrap.querySelectorAll('.dot,.dot-label').forEach(el => el.remove());
  document.getElementById('current').textContent = cities[0];
  log.textContent = '초기화됨. 다시 클릭하세요.\n';
}

function generateSVG() {
  const [s,t,n,k,f] = points;
  const routePath = `M${s.x},${s.y} Q${Math.round((s.x+t.x)/2)},${Math.round((s.y+t.y)/2)} ${t.x},${t.y} Q${Math.round((t.x+n.x)/2)},${Math.round((t.y+n.y)/2)} ${n.x},${n.y} L${k.x},${k.y} L${f.x},${f.y}`;

  let svg = `\n── SVG 코드 (이것을 복사하세요) ──\n\n`;
  svg += `<svg viewBox="0 0 ${cv.width} ${cv.height}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">\n`;
  svg += `  <path class="route-line" id="routeLine" d="${routePath}" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>\n`;
  svg += `  <path class="route-line" id="routeLine2" d="${routePath}" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>\n\n`;

  points.forEach((p, i) => {
    const labelLeft = (i === 3 || i === 4); // 교토, 후쿠오카는 왼쪽
    const lx = labelLeft ? p.x - 150 : p.x + 17;
    const ly = p.y - 22;
    svg += `  <!-- ${cities[i]} -->\n`;
    svg += `  <g class="city-dot" id="dot${i}">\n`;
    svg += `    <circle cx="${p.x}" cy="${p.y}" r="9" fill="rgba(0,0,0,.5)"><animate attributeName="r" values="9;14;9" dur="2s" repeatCount="indefinite" begin="${i*0.4}s"/></circle>\n`;
    svg += `    <circle cx="${p.x}" cy="${p.y}" r="5" fill="#fff"/>\n`;
    svg += `    <rect x="${lx}" y="${ly}" width="${labelLeft?140:120}" height="48" class="label-bg"/>\n`;
    svg += `    <text x="${lx+10}" y="${ly+18}" class="map-city-label">${cities[i]}</text>\n`;
    svg += `    <text x="${lx+10}" y="${ly+32}" class="map-city-jp">${cityJp[i]} · ${cityDays[i]}</text>\n`;
    svg += `  </g>\n`;
  });

  svg += `\n  <g class="route-plane" id="routePlane">\n`;
  svg += `    <animateMotion id="planeAnim" dur="4s" fill="freeze" begin="indefinite" path="M${s.x},${s.y} L${t.x},${t.y} L${n.x},${n.y} L${k.x},${k.y} L${f.x},${f.y}"/>\n`;
  svg += `    <text font-size="22" text-anchor="middle" dy="6">✈</text>\n`;
  svg += `  </g>\n`;
  svg += `</svg>`;

  log.textContent += svg;
}

function copyResult() {
  const text = log.textContent;
  const svgStart = text.indexOf('<svg');
  if (svgStart === -1) { alert('먼저 5개 도시를 모두 클릭하세요!'); return; }
  navigator.clipboard.writeText(text.substring(svgStart)).then(() => alert('SVG 코드 복사 완료!'));
}
</script>
</body></html>
